<h2 mat-dialog-title>Editar {{tipo}}</h2>

<form [formGroup]="form">

  <mat-dialog-content>

    <mat-form-field appearance="fill" class="w-100 mb-2">
      <mat-label>Título</mat-label>
      <input matInput formControlName="titulo">
      <mat-error *ngIf="form.get('titulo')?.invalid && form.get('titulo')?.touched">
        Título obligatorio
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="fill" class="w-100 mb-2">
      <mat-label>Descripción</mat-label>
      <input matInput formControlName="descripcion">
    </mat-form-field>

    <mat-form-field appearance="fill" class="w-100 mb-2">
      <mat-label>Año</mat-label>
      <input matInput type="number" formControlName="anio">
    </mat-form-field>

    <!-- Película -->
    <mat-form-field *ngIf="tipo === 'pelicula'" appearance="fill" class="w-100 mb-2">
      <mat-label>Duración (min)</mat-label>
      <input matInput type="number" formControlName="duracion">
    </mat-form-field>

    <!-- Serie -->
    <mat-form-field *ngIf="tipo === 'serie'" appearance="fill" class="w-100 mb-2">
      <mat-label>Temporadas</mat-label>
      <input matInput type="number" formControlName="numeroTemporadas">
    </mat-form-field>

  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-stroked-button color="warn" mat-dialog-close>Cancelar</button>
    <button mat-flat-button color="primary" [mat-dialog-close]="form.value" [disabled]="form.invalid">
      Guardar
    </button>
  </mat-dialog-actions>

</form>
