<div class="auth-container d-flex align-items-center justify-content-center">
  <div class="auth-card p-4">

    <h2 class="text-center mb-4">📝 Crear cuenta</h2>

    <form (ngSubmit)="register()">

      <input type="text"
             [(ngModel)]="username"
             name="username"
             placeholder="Usuario"
             required
             class="form-control mb-3">

      <input type="email"
             [(ngModel)]="email"
             name="email"
             placeholder="Email"
             required
             class="form-control mb-3">

      <input type="password"
             [(ngModel)]="password"
             name="password"
             placeholder="Password"
             required
             class="form-control mb-3">

      <button type="submit"
              class="btn btn-success w-100 mb-2">
        Registrarse
      </button>

    </form>

    <p class="text-center mt-3 mb-0">
      ¿Ya tienes cuenta?
      <a (click)="goLogin()" class="text-danger">Login</a>
    </p>

  </div>
</div>
