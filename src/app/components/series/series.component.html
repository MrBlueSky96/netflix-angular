<h2>Series</h2>

<form (ngSubmit)="agregarSerie()">
  <input [(ngModel)]="nuevaSerie.titulo" name="titulo" placeholder="Título" required>
  <input [(ngModel)]="nuevaSerie.descripcion" name="descripcion" placeholder="Descripción" required>
  <input [(ngModel)]="nuevaSerie.anio" name="anio" type="number" placeholder="Año" required>
  <input [(ngModel)]="nuevaSerie.numeroTemporadas" name="numeroTemporadas" type="number" placeholder="Número de temporadas" required>
  <button type="submit">Agregar Serie</button>
</form>

<ul>
  <li *ngFor="let s of series">
    {{s.titulo}} ({{s.anio}}) - {{s.numeroTemporadas}} temporadas
    <button (click)="eliminarSerie(s.id)">Eliminar</button>
  </li>
</ul>
