<div class="container mt-4">

  <h2 class="mb-4">Películas</h2>

  <form (ngSubmit)="agregarPelicula()" class="card p-3 mb-4 shadow-sm">

    <div class="row g-2">
      <div class="col-md-3">
        <input [(ngModel)]="nuevaPelicula.titulo" name="titulo" class="form-control" placeholder="Título" required>
      </div>

      <div class="col-md-3">
        <input [(ngModel)]="nuevaPelicula.descripcion" name="descripcion" class="form-control" placeholder="Descripción" required>
      </div>

      <div class="col-md-2">
        <input [(ngModel)]="nuevaPelicula.anio" name="anio" type="number" class="form-control" placeholder="Año" required>
      </div>

      <div class="col-md-2">
        <input [(ngModel)]="nuevaPelicula.duracion" name="duracion" type="number" class="form-control" placeholder="Duración (min)" required>
      </div>

      <div class="col-md-2">
        <button class="btn btn-primary w-100" type="submit">Añadir</button>
      </div>
    </div>

  </form>

  <ul class="list-group">
    <li *ngFor="let p of peliculas" class="list-group-item d-flex justify-content-between align-items-center">
      <span>
        <strong>{{p.titulo}}</strong> ({{p.anio}}) - {{p.duracion}} min
      </span>
      <button class="btn btn-danger btn-sm" (click)="eliminarPelicula(p.id)">Eliminar</button>
    </li>
  </ul>

</div>
